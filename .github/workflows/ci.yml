name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  verify:
    name: Verify (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run test:lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:unit -- --watchAll=false

      - name: Build
        run: npm run build

  branch-protection-gate:
    name: Branch Protection Gate
    runs-on: ubuntu-latest
    needs:
      - verify
    if: ${{ always() }}
    steps:
      - name: Enforce required checks
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "Required CI checks did not pass."
            exit 1
          fi
          echo "All required checks passed."
